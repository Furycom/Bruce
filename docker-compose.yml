services:
  mcp-gateway:
    env_file:
      - .env
    build:
      context: .
      dockerfile: mcp-gateway/Dockerfile
    container_name: mcp-gateway
    restart: unless-stopped
    mem_limit: 256m
    cpus: '1.0'
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MANUAL_ROOT=/manual-docs
      - BRUCE_AUTH_TOKEN=${BRUCE_AUTH_TOKEN}
      - BRUCE_TOKEN=${BRUCE_TOKEN}
      - BRUCE_LLM_API_BASE=http://192.168.2.230:4100/v1
      - BRUCE_LLM_MODEL=${BRUCE_LLM_MODEL}
      - BRUCE_MAX_MESSAGE_CHARS=8000
      - BRUCE_LLM_TIMEOUT_MS=180000
      - EMBEDDER_URL=http://192.168.2.85:8081
      - BRUCE_MAX_CONCURRENT=3
      - BRUCE_FALLBACK_LOG_PATH=/workspace/mcp-gateway/bruce-fallback.log
      - BRUCE_SOURCE_DEFAULT=openwebui
    volumes:
      - /home/furycom/mcp-stack:/workspace
      - /home/furycom/mcp-stack/shared:/app/shared:ro
      - /home/furycom/mcp-stack/routes:/app/routes:rw
      - /home/furycom/manual-docs:/manual-docs:ro
      - /home/furycom/bruce-config:/home/furycom/bruce-config
      - /home/furycom/inbox:/home/furycom/inbox
      - /home/furycom/archive_inbox:/home/furycom/archive_inbox
      - /home/furycom/uploads:/home/furycom/uploads
      - /home/furycom/venv-ingestion:/home/furycom/venv-ingestion:ro
      - /home/furycom/push_to_staging.py:/home/furycom/push_to_staging.py:ro
      - /home/furycom/bruce_ingest.py:/home/furycom/bruce_ingest.py:ro
      - /home/furycom/.ssh/id_ed25519:/home/node/.ssh/id_ed25519:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/bruce/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1.5'
    ports:
      - "4100:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=${BRUCE_LITELLM_KEY:-bruce-litellm-key-01}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-bruce-langfuse-2026}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://192.168.2.154:3200}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - default
